name: ai_notification_assistant
description: A privacy-first Android application that captures notifications and summarizes them using Gemma.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.18.1
  flutter_tts: ^3.8.3
  shared_preferences: ^2.2.2
  permission_handler: ^11.1.0
  cupertino_icons: ^1.0.6
  path_provider: ^2.1.2
  dio: ^5.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
